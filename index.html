<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS BRIGADISTA TÁTICO V4.0</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<style>
body{background:#000;color:#0f0;font-family:monospace;margin:0;padding:10px}
.topo{border-bottom:1px solid #f40;padding:5px;color:#0f0}
button{background:#f40;color:#fff;border:none;padding:10px;margin:3px;border-radius:5px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:20px}
#log{border:1px solid #f40;height:150px;margin-top:10px;padding:5px;overflow:auto}
</style>
</head>
<body>
<div class="topo">
LAT: <span id="lat">--°S</span> | LON: <span id="lon">--°W</span> | Alt: <span id="alt">--m</span> | <span id="vel">0 km/h</span>
</div>
<div id="log">Carregando...</div>
<div class="grid">
<button onclick="pegarGPS()">📍GPS</button>
<button onclick="tirarFoto()">📸FOTO</button>
<button onclick="gravarTrilha()">📍TRILHA</button>
<button onclick="marcarWPT()">📌WPT</button>
<button onclick="enviarSOS()">🆘SOS</button>
<button onclick="alert('Função SAT')">🛰️SAT</button>
<button onclick="alert('Função NASA')">🔥NASA</button>
<button onclick="alert('Modo Offline Ativo')">📡OFFLINE</button>
<button onclick="alert('Função Ocorrência')">📋OCORRÊNCIA</button>
<button onclick="alert('QAP')">📻QAP</button>
<button onclick="alert('Checklist')">✅CHECKLIST</button>
<button onclick="copiarCoord()">📋COORD</button>
<button onclick="window.open('https://wa.me/')">💬WHATS</button>
<button onclick="document.body.classList.toggle('dark')">🌙DARK</button>
</div>
<script>
let lat=0,lon=0;
function log(msg){document.getElementById('log').innerHTML=msg;}
function pegarGPS(){
if(navigator.geolocation){
log('Buscando GPS...');
navigator.geolocation.getCurrentPosition(p=>{
lat=p.coords.latitude;
lon=p.coords.longitude;
document.getElementById('lat').innerText=lat.toFixed(5)+'°S';
document.getElementById('lon').innerText=lon.toFixed(5)+'°W';
document.getElementById('alt').innerText=p.coords.altitude?.toFixed(0)+'m' || '--m';
document.getElementById('vel').innerText=(p.coords.speed*3.6)?.toFixed(0)+' km/h' || '0 km/h';
log(`GPS OK: ${lat.toFixed(5)}, ${lon.toFixed(5)}`);
},e=>{log('ERRO GPS: Permissão negada. Clica no 🔒 e permite Localização.');});
}else{log('GPS não suportado');}
}
function marcarWPT(){
if(lat===0){log('Pega o GPS primeiro!');return;}
log(`WPT Marcado: ${lat.toFixed(5)}, ${lon.toFixed(5)}`);
}
function gravarTrilha(){log('Trilha iniciada. Em desenvolvimento.');}
function enviarSOS(){
if(lat===0){log('Pega o GPS primeiro!');return;}
let msg=`SOS BRIGADISTA%0ALAT:${lat.toFixed(5)}%0ALON:${lon.toFixed(5)}%0AGoogle Maps: https://maps.google.com/?q=${lat},${lon}`;
window.open(`https://wa.me/?text=${msg}`);
}
function copiarCoord(){
navigator.clipboard.writeText(`${lat}, ${lon}`);
log('Coordenadas copiadas!');
}
function tirarFoto(){log('Função FOTO: em desenvolvimento');}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
